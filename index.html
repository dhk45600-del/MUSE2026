<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title></title>
  <style>
<style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      /* 이미지를 화면 중앙에 배치 */
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden; /* 스크롤바가 생기지 않게 방지 */
    }

    img {
      /* 핵심: 가로/세로 중 화면에 먼저 닿는 쪽을 기준으로 크기 조절 */
      max-width: 100vw;  /* 화면 너비보다 커지지 않음 */
      max-height: 100vh; /* 화면 높이보다 커지지 않음 */
      width: auto;       /* 비율 유지 */
      height: auto;      /* 비율 유지 */
      display: block;
    }
        
  </style>
</head>
<body>

<img src="poster_1.png">

</body>
</html>
